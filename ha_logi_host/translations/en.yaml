configuration:
  receiver_type:
    name: Receiver type
    description: >-
      Type of Logitech USB receiver plugged into the host.
      Use "unifying" for the Logitech Unifying Receiver (orange star logo)
      or "bolt" for the newer Logi Bolt receiver (green logo).
  device_path:
    name: Receiver device (optional)
    description: >-
      Select the hidraw device for the Logitech receiver from the
      dropdown. Leave unset to auto-discover the receiver. Set this
      if auto-discovery picks the wrong device or you have multiple
      Logitech receivers.
  log_level:
    name: Log level
    description: >-
      Logging verbosity. Use "debug" for troubleshooting,
      "info" for normal operation.
